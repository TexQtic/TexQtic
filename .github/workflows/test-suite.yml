# INF-TEST-POOL-001 — Full Test Suite (Sequential Mode)
#
# Runs on every PR targeting main or develop.
# Executes the full Vitest suite in sequential mode (--sequence=sequential
# --maxWorkers=1) to prevent Supabase PgBouncer session-mode pool saturation
# under concurrency.
#
# Design rationale:
#   Projections now execute real DB transactions (correct behavior post-17b5bbf).
#   Running 20+ test files in parallel bursts past the pgbouncer session pool limit.
#   Sequential execution serialises DB access, keeping CI signal deterministic.
#   This constraint is lifted once platform infra pool is scaled (see INF-TEST-POOL-001).
#
# Required repository secrets:
#   DATABASE_URL — Supabase Postgres connection string (sslmode=require)
#
# The job FAILS if DATABASE_URL is absent. A missing secret NEVER produces a passing run.

name: Full Test Suite — Sequential (INF-TEST-POOL-001)

on:
  pull_request:
    branches: [main, develop]

jobs:
  test-suite:
    name: Vitest (sequential)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-server-${{ hashFiles('server/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-server-

      - name: Install server dependencies
        working-directory: server
        run: pnpm install --frozen-lockfile

      - name: Validate required secrets
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is not configured."
            echo "::error::Add DATABASE_URL to GitHub repository secrets (Settings → Secrets)."
            echo "::error::A missing secret NEVER produces a passing run."
            exit 1
          fi
          echo "Secrets present: DATABASE_URL=<redacted>"

      - name: Typecheck (server)
        working-directory: server
        run: pnpm run typecheck

      - name: Run full test suite (sequential — INF-TEST-POOL-001)
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm run test:ci
