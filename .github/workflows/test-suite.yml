# INF-TEST-GATES-003 P2 — PR Gate (No-DB)
#
# Runs on every PR targeting main or develop.
# Executes typecheck, lint, and the full Vitest suite WITHOUT a DATABASE_URL.
# DB-dependent tests detect the absent URL via the hasDb helper and SKIP cleanly.
# This gate never requires database secrets — it always passes for pure logic/unit work.
#
# DB/RLS integration gates run separately on a schedule + manual trigger
# via the "DB / RLS Integration Gates" workflow (db-gates.yml).

name: PR Gate — Typecheck + No-DB Tests (INF-TEST-GATES-003)

on:
  pull_request:
    branches: [main, develop]

jobs:
  pr-gate:
    name: Typecheck + No-DB Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-server-${{ hashFiles('server/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-server-

      - name: Install server dependencies
        working-directory: server
        run: pnpm install --frozen-lockfile

      - name: Typecheck (server)
        working-directory: server
        run: pnpm run typecheck

      - name: Lint (server)
        working-directory: server
        run: pnpm run lint

      - name: Run Vitest — no-DB mode (DB suites skip via hasDb guard)
        working-directory: server
        env:
          # Explicitly empty — hasDb helper treats this as absent.
          # DB-dependent describes will SKIP, not FAIL.
          DATABASE_URL: ''
        run: pnpm run test:ci
