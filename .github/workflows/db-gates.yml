# INF-TEST-GATES-003 P2 — DB / RLS Integration Gates
#
# Runs:
#   - Manually via the "Run workflow" button in the Actions tab.
#   - On a nightly schedule (02:00 UTC) to catch regressions.
#
# What it does:
#   Runs the full Vitest suite in sequential mode WITH a real DATABASE_URL.
#   All DB-dependent describes that are skipped in the PR gate execute here.
#   Also runs the G-013 RLS 0-row cross-tenant proof.
#
# Required repository secrets:
#   DATABASE_URL    — Supabase Postgres connection string (sslmode=require)
#   CI_TENANT_A_ID  — UUID of first known tenant (e.g. ACME)
#   CI_TENANT_B_ID  — UUID of second known tenant (e.g. WL)
#
# A missing DATABASE_URL secret blocks execution — silence is never a passing run.

name: DB / RLS Integration Gates (INF-TEST-GATES-003)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for triggering DB gates manually'
        required: false
        default: 'manual verification'
  schedule:
    # Nightly at 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  db-gates:
    name: DB / RLS Integration Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-server-${{ hashFiles('server/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-server-

      - name: Install server dependencies
        working-directory: server
        run: pnpm install --frozen-lockfile

      - name: Validate required secrets (DB gates)
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CI_TENANT_A_ID: ${{ secrets.CI_TENANT_A_ID }}
          CI_TENANT_B_ID: ${{ secrets.CI_TENANT_B_ID }}
        run: |
          MISSING=0
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::[DB Gates] DATABASE_URL secret is not configured."
            echo "::error::Add DATABASE_URL to GitHub repository secrets (Settings → Secrets → Actions)."
            MISSING=1
          fi
          if [ -z "$CI_TENANT_A_ID" ]; then
            echo "::error::[DB Gates] CI_TENANT_A_ID secret is not configured."
            MISSING=1
          fi
          if [ -z "$CI_TENANT_B_ID" ]; then
            echo "::error::[DB Gates] CI_TENANT_B_ID secret is not configured."
            MISSING=1
          fi
          if [ "$MISSING" -eq 1 ]; then
            echo "::error::[DB Gates] One or more required secrets are missing. A missing secret NEVER produces a passing run."
            exit 1
          fi
          echo "[DB Gates] Secrets present: DATABASE_URL=<redacted> CI_TENANT_A_ID=<redacted> CI_TENANT_B_ID=<redacted>"

      - name: Typecheck (server)
        working-directory: server
        run: pnpm run typecheck

      - name: Run DB / RLS integration test suite
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "[DB Gates] Running full Vitest suite with DATABASE_URL set."
          echo "[DB Gates] All DB-dependent describes will EXECUTE (hasDb = true)."
          pnpm run test:ci

      - name: Run RLS 0-row cross-tenant proof (G-013)
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CI_TENANT_A_ID: ${{ secrets.CI_TENANT_A_ID }}
          CI_TENANT_B_ID: ${{ secrets.CI_TENANT_B_ID }}
        run: |
          echo "[DB Gates] Running G-013 RLS cross-tenant 0-row proof."
          pnpm run ci:rls-proof

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "## DB / RLS Integration Gates Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Command |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| DB Vitest suite | \`pnpm run test:ci\` (DATABASE_URL set) |" >> $GITHUB_STEP_SUMMARY
          echo "| RLS 0-row proof | \`pnpm run ci:rls-proof\` (G-013) |" >> $GITHUB_STEP_SUMMARY
