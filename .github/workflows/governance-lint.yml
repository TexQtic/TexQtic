# Governance Linter — Structural Governance Drift Guard
#
# Runs the minimal repo-local governance linter on pull requests and pushes to main.
# The linter blocks only machine-checkable structural violations and never attempts
# to auto-decide historical, sequencing, or materiality judgment.

name: Governance Linter

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  governance-lint:
    name: Governance Structural Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-server-${{ hashFiles('server/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-server-

      - name: Install server dependencies (provides tsx)
        working-directory: server
        run: pnpm install --frozen-lockfile

      - name: Run governance linter
        run: pnpm run governance:lint

      - name: Upload governance lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-lint-report
          path: artifacts/governance-lint-report.json
          if-no-files-found: warn
          retention-days: 30
